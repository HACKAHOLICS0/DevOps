version: '3.8'

services:
  # ... [keep your existing tp-foyer, mysql-db, mysqld-exporter] ...

  nexus:
    image: sonatype/nexus3
    container_name: nexus
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - nexus-data:/nexus-data
    networks:
      - tpfoyer-network

  sonarqube:
    image: sonarqube
    container_name: sonarqube
    restart: unless-stopped
    environment:
      - SONAR_CE_JAVAOPTS=-Dsonar.web.javaAdditionalOpts=-Dsonar.prometheus.monitor=true
    ports:
      - "9000:9000"
      - "9092:9092"
    networks:
      - tpfoyer-network

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - tpfoyer-network

  grafana:
    image: grafana/grafana
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - tpfoyer-network

networks:
  tpfoyer-network:
    driver: bridge

volumes:
  mysql_data:
  nexus-data:
